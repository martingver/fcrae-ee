<!doctype html>
<html lang="et">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FC Rae SK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@600;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"Manrope",system-ui,sans-serif;
  background:#0b0c0f;
  color:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
  -webkit-font-smoothing:antialiased;
}
.logo{
  width:min(420px,75vw);
  height:auto;
  display:block;
  filter:drop-shadow(0 20px 50px rgba(0,0,0,.5));
}
h1{
  font-family:"Anton",sans-serif;
  font-size:clamp(2rem,5vw,3.2rem);
  letter-spacing:2px;
  text-transform:uppercase;
  margin-top:30px;
  text-align:center;
}
h1 span{color:#FFCE00}
.tag{
  font-weight:600;
  font-size:.85rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:#9aa1ad;
  margin-top:10px;
  text-align:center;
}
.sponsors{
  margin-top:70px;
  width:100%;
  max-width:760px;
  text-align:center;
}
.sp-label{
  font-weight:800;
  font-size:.72rem;
  letter-spacing:.24em;
  text-transform:uppercase;
  color:#FFCE00;
  margin-bottom:24px;
}
.sp-main{
  display:block;
  background:#fff;
  border:2px solid #FFCE00;
  border-radius:8px;
  padding:28px 24px;
  text-decoration:none;
  max-width:420px;
  margin:0 auto 18px;
  transition:transform .2s ease,box-shadow .2s ease;
  text-align:center;
}
.sp-main img{max-width:75%;max-height:60px;width:auto;height:auto;margin:8px auto 0;display:block}
.sp-main:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(255,206,0,.22)}
.sp-main .tier{
  display:inline-block;
  background:#FFCE00;
  color:#111;
  font-weight:800;
  font-size:.62rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  padding:4px 10px;
  border-radius:30px;
  margin-bottom:12px;
}
.sp-main .nm{
  font-family:"Anton",sans-serif;
  font-size:1.5rem;
  color:#111;
  letter-spacing:1px;
  text-transform:uppercase;
}
.sp-row{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  max-width:420px;
  margin:0 auto;
}
.sp-card{
  background:#fff;
  border-radius:8px;
  padding:22px 18px;
  text-decoration:none;
  text-align:center;
  transition:transform .2s ease,box-shadow .2s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:90px;
}
.sp-card img{max-width:90%;max-height:42px;width:auto;height:auto;display:block;object-fit:contain}
.sp-card .nm{font-family:"Anton",sans-serif;font-size:1.1rem;color:#111;letter-spacing:.5px;text-transform:uppercase}
.sp-card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(0,0,0,.35)}
.sp-card .nm{
  font-family:"Anton",sans-serif;
  font-size:1.1rem;
  color:#111;
  letter-spacing:.5px;
  text-transform:uppercase;
}
footer{
  margin-top:70px;
  font-size:.75rem;
  color:#666;
  text-align:center;
}
@media(max-width:480px){
  .sp-row{grid-template-columns:1fr}
}
</style>
</head>
