name: Update jalgpall.ee cache

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Refresh data cache
        run: npm run update:data

      - name: Commit cache changes
        run: |
          if git diff --quiet -- data/jalgpall-cache.json; then
            echo "No cache changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/jalgpall-cache.json
          git commit -m "Update jalgpall.ee cache"
          git push
